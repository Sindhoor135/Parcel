<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provide Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="customer-feedback.component.css">
</head>
<body>

<div class="container mt-4">
  <h2>⭐ Provide Feedback</h2>
  <hr>

  <div class="card">
    <div class="card-header bg-warning">
      <h5 class="mb-0">Share Your Experience</h5>
    </div>
    <div class="card-body">
      <form id="feedbackForm">
        <div class="mb-3">
          <label class="form-label">Booking ID</label>
          <input type="text" class="form-control" id="bookingId" placeholder="Enter your booking ID" required minlength="3">
          <div id="bidError" class="text-danger small d-none">Booking ID is required (at least 3 characters).</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Rating</label>
          <div class="rating-input">
            <select class="form-select" id="rating" required>
              <option value="">-- Please select a rating --</option>
              <option value="5">⭐⭐⭐⭐⭐ 5 - Excellent</option>
              <option value="4">⭐⭐⭐⭐ 4 - Good</option>
              <option value="3">⭐⭐⭐ 3 - Average</option>
              <option value="2">⭐⭐ 2 - Poor</option>
              <option value="1">⭐ 1 - Terrible</option>
            </select>
          </div>
          <div id="ratingError" class="text-danger small d-none">Please select a rating.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Feedback Description</label>
          <textarea class="form-control" id="description" rows="5" required minlength="5" maxlength="500" placeholder="Tell us about your experience..."></textarea>
          <div id="descError" class="text-danger small d-none">
            Please provide a description of at least 5 characters.
          </div>
          <small class="text-muted"><span id="charCount">0</span>/500 characters</small>
        </div>

        <div class="d-grid gap-2 d-sm-flex justify-content-sm-end">
          <button type="button" class="btn btn-secondary" onclick="resetForm()">Clear</button>
          <button type="submit" id="submitBtn" class="btn btn-success" disabled>Submit Feedback</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
    const form = document.getElementById('feedbackForm');
    const bookingIdInput = document.getElementById('bookingId');
    const descInput = document.getElementById('description');
    const ratingInput = document.getElementById('rating');
    const submitBtn = document.getElementById('submitBtn');
    const charCount = document.getElementById('charCount');

    // Add event listeners for validation
    bookingIdInput.addEventListener('blur', validateBookingId);
    ratingInput.addEventListener('change', validateRating);
    descInput.addEventListener('blur', validateDescription);
    descInput.addEventListener('input', validateDescription);

    function validateBookingId() {
        const value = bookingIdInput.value.trim();
        const isValid = value.length >= 3;
        bookingIdInput.classList.toggle('is-invalid', !isValid && value.length > 0);
        bookingIdInput.classList.toggle('is-valid', isValid && value.length > 0);
        document.getElementById('bidError').classList.toggle('d-none', isValid || value.length === 0);
        checkFormValidity();
    }

    function validateRating() {
        const isValid = ratingInput.value !== '';
        ratingInput.classList.toggle('is-invalid', !isValid);
        ratingInput.classList.toggle('is-valid', isValid);
        document.getElementById('ratingError').classList.toggle('d-none', isValid);
        checkFormValidity();
    }

    function validateDescription() {
        const value = descInput.value;
        const isValid = value.length >= 5;
        descInput.classList.toggle('is-invalid', !isValid && value.length > 0);
        descInput.classList.toggle('is-valid', isValid);
        document.getElementById('descError').classList.toggle('d-none', isValid);
        checkFormValidity();
    }

    function checkFormValidity() {
        const bidValue = bookingIdInput.value.trim();
        const descValue = descInput.value;
        const ratingValue = ratingInput.value;
        
        const isDescValid = descValue.length >= 5;
        const isBidValid = bidValue.length >= 3;
        const isRatingValid = ratingValue !== '';

        submitBtn.disabled = !(isDescValid && isBidValid && isRatingValid);
    }

    form.addEventListener('input', () => {
        const descValue = descInput.value;
        charCount.innerText = descValue.length;
        checkFormValidity();
    });

    function resetForm() {
        form.reset();
        charCount.innerText = "0";
        submitBtn.disabled = true;
        document.getElementById('bidError').classList.add('d-none');
        document.getElementById('descError').classList.add('d-none');
        document.getElementById('ratingError').classList.add('d-none');
        bookingIdInput.classList.remove('is-valid', 'is-invalid');
        descInput.classList.remove('is-valid', 'is-invalid');
        ratingInput.classList.remove('is-valid', 'is-invalid');
    }

    form.onsubmit = function(e) {
        e.preventDefault();
        
        // Final validation check
        validateBookingId();
        validateRating();
        validateDescription();

        if (submitBtn.disabled) {
            alert('Please fill all fields correctly.');
            return;
        }
        
        const feedbackData = {
            bookingId: bookingIdInput.value,
            rating: parseInt(ratingInput.value),
            description: descInput.value
        };

        console.log('Feedback submitted:', feedbackData);
        alert('Thank you for your feedback!');
        resetForm();
    };
</script>

</body>
</html>
